name: ticketing_scanner
description: Secure ticket validation app for event controllers
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # HTTP & Network
  dio: ^5.4.1
  connectivity_plus: ^6.0.1

  # QR Scanner
  mobile_scanner: ^4.0.0

  # Local Storage
  sqflite: ^2.3.2
  path: ^1.8.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Biometrics
  local_auth: ^2.1.8

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  permission_handler: ^11.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  pointycastle: ^3.7.4
  get_it: ^7.6.7
  injectable: ^2.3.2
  logger: ^2.0.2+1
  workmanager: ^0.9.0+3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  injectable_generator: ^2.4.1
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
